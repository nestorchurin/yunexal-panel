<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    {% include "_head_common.html" %}
    <title>Yunexal Panel</title>
    <link href="/static/css/base.css?v=4" rel="stylesheet">
    <link href="/static/css/dashboard.css?v=4" rel="stylesheet">
</head>
<body>
    {% include "_dashboard_topbar.html" %}

    <div class="container-xl py-4">
        <div class="mb-4">
            <h1 style="font-size:1.35rem;font-weight:700;letter-spacing:-.03em;" class="mb-1">Dashboard</h1>
            <p class="mb-0" style="font-size:.825rem;color:var(--muted);">Manage your game servers</p>
        </div>
        <div class="row g-3" id="server-list">
            {% include "server_list.html" %}
        </div>
    </div>

    <!-- Edit Server Modal -->
    <div class="modal fade" id="editServerModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h6 class="mb-0 fw-semibold">Edit Server</h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="editServerForm">
                    <div class="modal-body p-4">
                        <label class="d-block mb-1" style="font-size:.8rem;font-weight:500;color:var(--muted);">Server Name</label>
                        <input type="text" class="form-input" id="editServerName" name="name" required placeholder="my-server">
                        <div class="mt-2" style="font-size:.75rem;color:var(--muted);">Renames the Docker container.</div>
                    </div>
                    <div class="modal-footer gap-2 d-flex justify-content-end">
                        <button type="button" class="btn-yu btn-yu-ghost" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn-yu btn-yu-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Change Password Modal -->
    <div id="dashPwModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:600;backdrop-filter:blur(6px);align-items:center;justify-content:center;">
        <div class="yu-modal-inner" style="background:var(--surface);border:1px solid var(--bdr);border-radius:16px;padding:2rem;max-width:360px;width:90%;">
            <div style="display:flex;align-items:center;gap:.55rem;font-size:1rem;font-weight:700;letter-spacing:-.02em;margin-bottom:.3rem;">
                <span style="width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px var(--accent);flex-shrink:0;display:inline-block;"></span>
                Change Password
            </div>
            <div style="font-size:.825rem;color:var(--muted);margin-bottom:1.75rem;">Enter your current and new password.</div>
            <div id="dashPwAlert" style="display:none;border-radius:9px;padding:.65rem 1rem;font-size:.825rem;margin-bottom:1.25rem;align-items:center;gap:.5rem;"></div>
            <div style="margin-bottom:1.1rem;">
                <label style="font-size:.8rem;font-weight:500;color:var(--muted);display:block;margin-bottom:.4rem;">Current Password</label>
                <input type="password" id="dashPwCurrent" placeholder="••••••••" style="background:var(--surface2);border:1px solid rgba(255,255,255,.1);color:var(--txt);padding:.65rem 1rem;border-radius:9px;font-size:.875rem;width:100%;outline:none;font-family:'Inter',sans-serif;transition:border-color .15s,box-shadow .15s;" onfocus="this.style.borderColor='rgba(124,58,237,.5)';this.style.boxShadow='0 0 0 3px rgba(124,58,237,.12)'" onblur="this.style.borderColor='rgba(255,255,255,.1)';this.style.boxShadow='none'">
            </div>
            <div style="margin-bottom:1.1rem;">
                <label style="font-size:.8rem;font-weight:500;color:var(--muted);display:block;margin-bottom:.4rem;">New Password</label>
                <input type="password" id="dashPwNew" placeholder="••••••••" style="background:var(--surface2);border:1px solid rgba(255,255,255,.1);color:var(--txt);padding:.65rem 1rem;border-radius:9px;font-size:.875rem;width:100%;outline:none;font-family:'Inter',sans-serif;transition:border-color .15s,box-shadow .15s;" onfocus="this.style.borderColor='rgba(124,58,237,.5)';this.style.boxShadow='0 0 0 3px rgba(124,58,237,.12)'" onblur="this.style.borderColor='rgba(255,255,255,.1)';this.style.boxShadow='none'">
            </div>
            <div style="margin-bottom:1.5rem;">
                <label style="font-size:.8rem;font-weight:500;color:var(--muted);display:block;margin-bottom:.4rem;">Confirm New Password</label>
                <input type="password" id="dashPwConfirm" placeholder="••••••••" style="background:var(--surface2);border:1px solid rgba(255,255,255,.1);color:var(--txt);padding:.65rem 1rem;border-radius:9px;font-size:.875rem;width:100%;outline:none;font-family:'Inter',sans-serif;transition:border-color .15s,box-shadow .15s;" onfocus="this.style.borderColor='rgba(124,58,237,.5)';this.style.boxShadow='0 0 0 3px rgba(124,58,237,.12)'" onblur="this.style.borderColor='rgba(255,255,255,.1)';this.style.boxShadow='none'">
            </div>
            <button onclick="dashChangePassword()" style="background:var(--accent);color:#fff;border:none;border-radius:9px;padding:.7rem 1rem;font-size:.875rem;font-weight:600;width:100%;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:.4rem;" onmouseover="this.style.background='#6d28d9'" onmouseout="this.style.background='var(--accent)'">
                <i class="bi bi-shield-check"></i> Update Password
            </button>
            <button onclick="document.getElementById('dashPwModal').style.display='none'" style="background:transparent;border:none;color:var(--muted);font-size:.8rem;font-family:'Inter',sans-serif;cursor:pointer;width:100%;margin-top:.85rem;padding:.3rem;transition:color .15s;" onmouseover="this.style.color='var(--txt)'" onmouseout="this.style.color='var(--muted)'">
                Cancel
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/dashboard.js?v=6"></script>
    {% include "_script_footer.html" %}
    <script>
    function openDashModal() {
        const modal = document.getElementById('dashPwModal');
        modal.style.display = 'flex';
        const inner = modal.querySelector('.yu-modal-inner');
        if (inner) { inner.style.animation = 'none'; inner.offsetHeight; inner.style.animation = ''; }
    }
    async function dashChangePassword() {
        const cur = document.getElementById('dashPwCurrent').value;
        const nw  = document.getElementById('dashPwNew').value;
        const cfm = document.getElementById('dashPwConfirm').value;
        const alert = document.getElementById('dashPwAlert');
        const show = (msg, ok) => {
            alert.textContent = msg;
            alert.style.display = 'flex';
            alert.style.background = ok ? 'rgba(16,185,129,.12)' : 'rgba(239,68,68,.12)';
            alert.style.color = ok ? '#10b981' : '#ef4444';
            alert.style.border = ok ? '1px solid rgba(16,185,129,.25)' : '1px solid rgba(239,68,68,.25)';
        };
        if (!cur || !nw) return show('Please fill all fields.', false);
        if (nw !== cfm) return show('New passwords do not match.', false);
        if (nw.length < 8) return show('Password must be at least 8 characters.', false);
        const res = await fetch('/api/user/change-password', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({current: cur, new_password: nw})
        });
        const data = await res.json();
        if (data.ok) {
            show('Password updated successfully!', true);
            setTimeout(() => { document.getElementById('dashPwModal').style.display = 'none'; }, 1500);
        } else show(data.error || 'Failed to update password.', false);
    }
    </script>
</body>
</html>
