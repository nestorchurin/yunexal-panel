    <header class="yu-topbar">
        <div class="yu-brand"><span class="dot"></span>Yunexal Panel</div>
        <div class="ms-auto d-flex gap-2 align-items-center">
            {% if is_admin %}
            <button id="dash-my-only-btn" onclick="dashToggleOwner()"
                    style="display:inline-flex;align-items:center;gap:.45rem;padding:.35rem .75rem;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;border:1px solid rgba(124,58,237,.35);background:rgba(124,58,237,.15);color:#a78bfa;transition:all .15s;user-select:none;"
                    title="Show only my servers">
                <i class="bi bi-person-check" id="dash-my-only-icon"></i>
                <span id="dash-my-only-lbl">My only</span>
            </button>
            <a id="topbar-new-btn" href="/servers/new" class="btn-yu btn-yu-primary"><i class="bi bi-plus-lg"></i> New Server</a>
            {% endif %}
            <button id="amoled-btn" class="btn-yu btn-yu-ghost d-sm-none" onclick="toggleAmoled()" title="AMOLED mode"><i class="bi bi-circle-fill"></i></button>
            <div id="topbar-dropdown" class="dropdown">
                <button class="btn-yu btn-yu-ghost" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-person" style="color:var(--muted);"></i>
                    <span style="font-size:.825rem;font-weight:500;">{{ auth_username }}</span>
                    <i class="bi bi-chevron-down" style="font-size:.6rem;opacity:.5;"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-end" style="min-width:180px;background:#111119;border:1px solid var(--bdr);border-radius:10px;padding:.4rem;">
                    <li class="px-3 py-2" style="font-size:.75rem;color:var(--muted);border-bottom:1px solid var(--bdr);margin-bottom:.3rem;">Signed in as <strong style="color:var(--txt);">{{ auth_username }}</strong></li>
                    {% if is_admin %}
                    <li><a class="dropdown-item rounded-2" href="/admin" style="font-size:.82rem;color:var(--txt);"><i class="bi bi-shield-lock me-2 text-muted"></i>Admin Panel</a></li>
                    <li><hr class="dropdown-divider" style="border-color:var(--bdr);margin:.3rem 0;"></li>
                    {% endif %}
                    <li><button class="dropdown-item rounded-2" style="font-size:.82rem;color:var(--txt);" onclick="openDashModal()"><i class="bi bi-key me-2 text-muted"></i>Change Password</button></li>
                    <li><hr class="dropdown-divider" style="border-color:var(--bdr);margin:.3rem 0;"></li>
                    <li>
                        <form action="/logout" method="POST" style="margin:0;">
                            <button type="submit" class="dropdown-item rounded-2" style="font-size:.82rem;color:#ef4444;"><i class="bi bi-box-arrow-right me-2"></i>Log Out</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </header>
