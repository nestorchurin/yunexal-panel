{% if containers.is_empty() %}
<div class="col-12" data-empty="1">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4.5rem 2rem;border:1px dashed rgba(255,255,255,.1);border-radius:14px;background:rgba(255,255,255,.02);text-align:center;">
        <div style="width:56px;height:56px;border-radius:14px;background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.2);display:flex;align-items:center;justify-content:center;margin-bottom:1.25rem;">
            <i class="bi bi-server" style="font-size:1.4rem;color:#a78bfa;"></i>
        </div>
        <div style="font-size:1rem;font-weight:600;letter-spacing:-.015em;margin-bottom:.4rem;">No servers yet</div>
        <p style="font-size:.825rem;color:var(--muted);max-width:300px;margin-bottom:1.5rem;">Create your first server to get started. It'll appear here once running.</p>
        {% if is_admin %}
        <a href="/servers/new" class="btn-yu btn-yu-primary"><i class="bi bi-plus-lg"></i> New Server</a>
        {% endif %}
    </div>
</div>
{% else %}
{% for container in containers %}
    {% include "server_card.html" %}
{% endfor %}
{% endif %}
