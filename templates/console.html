<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ container.name }} - Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="/static/css/base.css?v=2" rel="stylesheet">
    <link href="/static/css/console.css" rel="stylesheet">
</head>
<body>
    <!-- Sidebar overlay backdrop (mobile) -->
    <div class="yu-sb-overlay" id="sbOverlay" onclick="closeSidebar()"></div>

    <div class="yu-layout">
        <aside class="yu-sidebar" id="sidebar">
            <a href="/" class="sb-back"><i class="bi bi-arrow-left"></i> Dashboard</a>
            <div class="sb-brand"><span class="dot"></span>Yunexal Panel</div>
            <div class="sb-server">
                <div class="sb-server-name">{{ container.name }}</div>
                <span id="server-status-badge" class="sb-status
                    {% if container.state == "running" %}sb-running
                    {% else if container.state == "restarting" %}sb-other
                    {% else %}sb-stopped{% endif %}">
                    <span class="sb-dot"></span><span id="status-text">{{ container.state }}</span>
                </span>
            </div>
            <nav class="sb-nav">
                <a href="/servers/{{id}}/console" class="sb-link active"><i class="bi bi-terminal-fill"></i> Console</a>
                <a href="/servers/{{id}}/files" class="sb-link"><i class="bi bi-folder2-open"></i> Files</a>
                <a href="/servers/{{id}}/networking" class="sb-link"><i class="bi bi-diagram-3"></i> Networking</a>
                <a href="/servers/{{id}}/settings" class="sb-link"><i class="bi bi-gear"></i> Settings</a>
            </nav>
        </aside>
        <main class="yu-main">
            <!-- Mobile topbar -->
            <div class="yu-topbar-mobile">
                <button class="yu-hamburger" onclick="openSidebar()"><i class="bi bi-list"></i></button>
                <div class="yu-mob-brand"><span class="dot"></span>{{ container.name }}</div>
            </div>
            <div class="yu-content">
                <div class="row g-3 yu-row-console" style="flex:1;min-height:0;">
                    <div class="col-lg-8 col-xl-9 d-flex flex-column yu-col-terminal" style="min-height:0;">
                        <div class="yu-panel flex-fill" style="display:flex;flex-direction:column;min-height:0;overflow:hidden;">
                            <div class="yu-panel-hd"><span><i class="bi bi-terminal me-2 text-muted"></i>Terminal</span></div>
                            <div class="yu-terminal-wrap" style="flex:1;background:#000;padding:10px;min-height:0;overflow:hidden;">
                                <div id="terminal" style="width:100%;height:100%;"></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-4 col-xl-3 d-flex flex-column gap-3 yu-col-controls" style="min-height:0;overflow-y:auto;">
                        <div class="yu-panel">
                            <div class="yu-panel-hd"><i class="bi bi-sliders me-2 text-muted"></i>Controls</div>
                            <div class="yu-panel-bd d-flex flex-column gap-2">
                                <button id="btn-start" class="btn-yu btn-yu-success" onclick="sendAction('start')"><i class="bi bi-play-fill"></i> Start</button>
                                <button id="btn-restart" class="btn-yu btn-yu-primary" onclick="sendAction('restart')"><i class="bi bi-arrow-repeat"></i> Restart</button>
                                <button id="btn-stop" class="btn-yu btn-yu-warning" onclick="sendAction('stop')"><i class="bi bi-stop-fill"></i> Stop</button>
                                <button id="btn-kill" class="btn-yu btn-yu-danger" onclick="confirmKill()"><i class="bi bi-lightning-fill"></i> Force Kill</button>
                            </div>
                        </div>
                        <div class="yu-panel" style="flex:1;">
                            <div class="yu-panel-hd"><i class="bi bi-graph-up me-2 text-muted"></i>Metrics</div>
                            <div class="yu-panel-bd">
                                <div class="stat-lbl mb-1">CPU</div>
                                <div class="chart-container"><canvas id="cpuChart"></canvas></div>
                                <div class="d-flex justify-content-between align-items-center mt-2 mb-1">
                                    <span class="stat-lbl">RAM</span>
                                    <span id="ram-text" style="font-size:.73rem;font-weight:600;">...</span>
                                </div>
                                <div class="chart-container"><canvas id="ramChart"></canvas></div>
                                <div class="d-flex justify-content-between align-items-center mt-2 mb-1">
                                    <span class="stat-lbl">Network I/O</span>
                                    <span id="net-text" style="font-size:.73rem;font-weight:600;">...</span>
                                </div>
                                <div class="chart-container"><canvas id="netChart"></canvas></div>
                            </div>
                        </div>
                        <!-- DNS Records panel -->
                        <div class="yu-panel">
                            <div class="yu-panel-hd" style="gap:.4rem;">
                                <i class="bi bi-hdd-network me-2 text-muted"></i>DNS Records
                                <button class="btn-yu btn-yu-ghost" style="margin-left:auto;font-size:.7rem;padding:.2rem .55rem;" onclick="consoleDnsOpenAdd()" title="Add DNS record"><i class="bi bi-plus-lg"></i></button>
                            </div>
                            <div class="yu-panel-bd" id="console-dns-list" style="min-height:2rem;padding:.5rem 0;">
                                <span style="font-size:.75rem;color:var(--muted);">Loading…</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- DNS Add Record Modal -->
    <div class="modal fade" id="consDnsModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="background:#111119;border:1px solid var(--bdr);border-radius:14px;">
                <div class="modal-header" style="border-bottom:1px solid rgba(255,255,255,.07);">
                    <h6 class="modal-title" style="font-weight:600;"><i class="bi bi-plus-circle me-2"></i>Add DNS Record</h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="cons-dns-alert" class="alert alert-danger mb-3" style="display:none;"></div>
                    <div class="mb-3">
                        <label style="font-size:.8rem;color:var(--muted);display:block;margin-bottom:.3rem;">Provider</label>
                        <select class="form-select" id="cons-dns-provider" onchange="consoleDnsLoadZones()">
                            <option value="">— select provider —</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label style="font-size:.8rem;color:var(--muted);display:block;margin-bottom:.3rem;">Zone / Domain</label>
                        <select class="form-select" id="cons-dns-zone">
                            <option value="">Select provider first</option>
                        </select>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-5">
                            <label style="font-size:.8rem;color:var(--muted);display:block;margin-bottom:.3rem;">Type</label>
                            <select class="form-select" id="cons-dns-type">
                                <option>A</option><option>AAAA</option><option>CNAME</option><option>TXT</option>
                            </select>
                        </div>
                        <div class="col-7">
                            <label style="font-size:.8rem;color:var(--muted);display:block;margin-bottom:.3rem;">Name / Subdomain</label>
                            <input type="text" class="form-control" id="cons-dns-name" placeholder="mc or mc.example.com">
                        </div>
                    </div>
                    <div>
                        <label style="font-size:.8rem;color:var(--muted);display:block;margin-bottom:.3rem;">Value / Target</label>
                        <div style="display:flex;gap:.4rem;">
                            <input type="text" class="form-control" id="cons-dns-value" placeholder="1.2.3.4 or target">
                            <button type="button" class="btn btn-outline-secondary btn-sm" style="white-space:nowrap;" onclick="consoleDnsFetchIp()" title="Fetch public IP"><i class="bi bi-cloud-arrow-down"></i></button>
                        </div>
                    </div>
                </div>
                <div class="modal-footer" style="border-top:1px solid rgba(255,255,255,.07);">
                    <button type="button" class="btn-yu btn-yu-ghost" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn-yu btn-yu-primary" onclick="consoleDnsSave()"><i class="bi bi-check-lg"></i> Add Record</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Kill Confirm Modal -->
    <div class="modal fade" id="killModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="background:#111119;border:1px solid rgba(239,68,68,.3);border-radius:14px;">
                <div class="modal-header" style="border-bottom:1px solid rgba(255,255,255,.07);">
                    <h6 class="modal-title" style="color:#ef4444;font-weight:600;"><i class="bi bi-exclamation-triangle me-2"></i>Force Stop?</h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" style="font-size:.875rem;color:#6a6a8a;">
                    Forcibly killing the server may cause data corruption. Are you sure?
                </div>
                <div class="modal-footer d-flex gap-2 justify-content-end" style="border-top:1px solid rgba(255,255,255,.07);">
                    <button type="button" class="btn-yu btn-yu-ghost" style="width:auto;" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn-yu btn-yu-danger" style="width:auto;" onclick="sendAction('kill'); bootstrap.Modal.getInstance(document.getElementById('killModal')).hide();">Kill Server</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>const YU_SERVER_ID = '{{id}}';</script>
    <script src="/static/js/sidebar.js"></script>
    <script src="/static/js/console.js"></script>
    <script src="/static/js/footer.js"></script>
</body>
</html>
