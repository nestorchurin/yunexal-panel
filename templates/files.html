<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ container.name }} - Files</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="/static/css/base.css" rel="stylesheet">
    <link href="/static/css/files.css" rel="stylesheet">
</head>
<body>
    <div class="yu-sb-overlay" id="sbOverlay" onclick="closeSidebar()"></div>
    <div class="yu-layout">
        <aside class="yu-sidebar" id="sidebar">
            <a href="/" class="sb-back"><i class="bi bi-arrow-left"></i> Dashboard</a>
            <div class="sb-brand"><span class="dot"></span>Yunexal Panel</div>
            <div class="sb-server">
                <div class="sb-server-name">{{ container.name }}</div>
                <span class="sb-status
                    {% if container.state == "running" %}sb-running
                    {% else if container.state == "restarting" %}sb-other
                    {% else %}sb-stopped{% endif %}">
                    <span class="sb-dot"></span>{{ container.state }}
                </span>
            </div>
            <nav class="sb-nav">
                <a href="/servers/{{id}}/console" class="sb-link"><i class="bi bi-terminal-fill"></i> Console</a>
                <a href="/servers/{{id}}/files" class="sb-link active"><i class="bi bi-folder2-open"></i> Files</a>
                <a href="/servers/{{id}}/networking" class="sb-link"><i class="bi bi-diagram-3"></i> Networking</a>
                <a href="/servers/{{id}}/settings" class="sb-link"><i class="bi bi-gear"></i> Settings</a>
            </nav>
        </aside>
        <main class="yu-main">
            <div class="yu-topbar-mobile">
                <button class="yu-hamburger" onclick="openSidebar()"><i class="bi bi-list"></i></button>
                <div class="yu-mob-brand"><span class="dot"></span>{{ container.name }}</div>
            </div>
            <div class="yu-content">
                <div class="yu-panel">
                    <div class="yu-panel-hd">
                        <span><i class="bi bi-folder2-open me-2 text-muted"></i>File Browser</span>
                        <button class="btn-yu btn-yu-primary" onclick="fbOpenCreate()">
                            <i class="bi bi-plus-lg"></i> New File
                        </button>
                    </div>
                    <div class="yu-panel-bd" id="fb-drop-zone">
                        <div id="fb-drop-overlay"><i class="bi bi-cloud-upload"></i><div>Drop files to upload</div></div>
                        <div id="file-browser"
                             hx-trigger="load"
                             hx-get="/api/servers/{{id}}/files/list?path=/"
                             hx-swap="outerHTML">
                            <div style="text-align:center;color:var(--muted);padding:2rem;">
                                <i class="bi bi-hourglass-split"></i> Loading...
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Upload progress bar -->
    <div id="fb-upload-progress" style="display:none">
        <div class="fb-up-header">
            <span id="fb-up-label">Uploading…</span>
            <span id="fb-up-counter"></span>
        </div>
        <div class="fb-up-bar-track">
            <div class="fb-up-bar-fill" id="fb-up-bar"></div>
        </div>
    </div>

    <!-- Rename Modal -->
    <div class="modal fade" id="renameModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h6 class="mb-0 fw-semibold">Rename</h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="fb-rename-form">
                        <input type="hidden" id="fb-rename-path" value="">
                        <label class="d-block mb-1" style="font-size:.8rem;font-weight:500;color:var(--muted);">New name</label>
                        <input type="text" id="fb-rename-name" class="form-input" placeholder="new-name.txt" required autocomplete="off">
                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <button type="button" class="btn-yu btn-yu-ghost" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn-yu btn-yu-primary"><i class="bi bi-pencil"></i> Rename</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Context Menu -->
    <div id="fb-ctx-menu">
        <div class="fb-ctx-item" id="fb-ctx-edit"><i class="bi bi-pencil-square"></i> Edit</div>
        <div class="fb-ctx-item" id="fb-ctx-open"><i class="bi bi-folder2-open"></i> Open</div>
        <div class="fb-ctx-sep"></div>
        <div class="fb-ctx-item" id="fb-ctx-rename"><i class="bi bi-fonts"></i> Rename</div>
        <div class="fb-ctx-item" id="fb-ctx-copy"><i class="bi bi-files"></i> Copy</div>
        <div class="fb-ctx-item" id="fb-ctx-paste"><i class="bi bi-clipboard-check"></i> Paste</div>
        <div class="fb-ctx-sep"></div>
        <div class="fb-ctx-item fb-ctx-danger" id="fb-ctx-delete"><i class="bi bi-trash3"></i> Delete</div>
    </div>
    <div class="modal fade" id="createFileModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h6 class="mb-0 fw-semibold">Create New File</h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form hx-post="/api/servers/{{id}}/files/create" hx-swap="none">
                        <p style="font-size:.75rem;color:var(--muted);margin-bottom:.75rem;">
                            Creating in: <code id="fb-create-dir">/</code>
                        </p>
                        <input type="hidden" name="path" id="fb-create-path" value="/">
                        <label class="d-block mb-1" style="font-size:.8rem;font-weight:500;color:var(--muted);">Filename</label>
                        <input type="text" name="name" id="fb-create-name" class="form-input" placeholder="eula.txt" required autocomplete="off">
                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <button type="button" class="btn-yu btn-yu-ghost" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn-yu btn-yu-primary" data-bs-dismiss="modal">
                                <i class="bi bi-file-earmark-plus"></i> Create
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/sidebar.js"></script>
    <script src="/static/js/footer.js"></script>
    <script src="/static/js/files.js"></script>
</body>
</html>
