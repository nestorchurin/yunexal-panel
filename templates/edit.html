<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    {% include "_head_common.html" %}
    <title>{{ filename }} — {{ container.name }}</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js"></script>
    <link href="/static/css/base.css?v=2" rel="stylesheet">
    <style>
        .yu-edit-layout {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .yu-edit-bar {
            display: flex;
            align-items: center;
            gap: .6rem;
            padding: .75rem 1.1rem;
            border-bottom: 1px solid var(--bdr);
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .yu-edit-path {
            font-size: .8rem;
            color: var(--muted);
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .yu-edit-path strong { color: var(--txt); }
        #yu-ace-wrap {
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }
        #yu-ace {
            width: 100%;
            height: 100%;
        }
        #yu-save-st {
            font-size: .8rem;
            opacity: 0;
            transition: opacity .3s;
        }
    </style>
</head>
<body>
    <div class="yu-sb-overlay" id="sbOverlay" onclick="closeSidebar()"></div>
    <div class="yu-layout" style="height:100vh;">
        {% include "_server_sidebar.html" %}
        <main class="yu-main" style="display:flex;flex-direction:column;min-height:0;overflow:hidden;">
            {% include "_mobile_topbar.html" %}
            <div class="yu-content" style="flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;padding-bottom:0;">
                <div class="yu-panel" style="flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;margin-bottom:0;">
                    <div class="yu-edit-bar">
                        <a href="/servers/{{id}}/files" class="btn-yu btn-yu-ghost" style="flex-shrink:0;">
                            <i class="bi bi-arrow-left"></i> Files
                        </a>
                        <div class="yu-edit-path">
                            <i class="bi bi-file-earmark-code me-1"></i>
                            <strong>{{ filename }}</strong>
                            <span style="margin-left:.4rem;opacity:.5;">{{ path }}</span>
                        </div>
                        <span id="yu-save-st"></span>
                        <button type="button" id="yu-save-btn" class="btn-yu btn-yu-primary" style="flex-shrink:0;">
                            <i class="bi bi-floppy"></i> Save
                        </button>
                    </div>
                    <div id="yu-ace-wrap">
                        <div id="yu-ace"></div>
                    </div>
                    <pre id="yu-raw" style="display:none;">{{ content }}</pre>
                </div>
            </div>
        </main>
    </div>

    {% include "_scripts_server.html" %}
    {% include "_script_footer.html" %}
    <script>
        var YU_SID  = '{{ id }}';
        var YU_PATH = '{{ path }}';

        var ed = ace.edit('yu-ace');
        ed.setTheme('ace/theme/monokai');
        ed.session.setMode('{{ ace_mode }}');
        ed.setValue(document.getElementById('yu-raw').textContent, -1);
        ed.setShowPrintMargin(false);
        ed.setFontSize(13);

        // Ctrl+S / Cmd+S to save
        ed.commands.addCommand({
            name: 'save',
            bindKey: { win: 'Ctrl-S', mac: 'Command-S' },
            exec: doSave
        });

        document.getElementById('yu-save-btn').addEventListener('click', doSave);

        function doSave() {
            var btn = document.getElementById('yu-save-btn');
            var st  = document.getElementById('yu-save-st');
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-arrow-repeat"></i> Saving…';
            var params = new URLSearchParams();
            params.append('path', YU_PATH);
            params.append('content', ed.getValue());
            fetch('/api/servers/' + YU_SID + '/files/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params.toString()
            }).then(function(r) {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-floppy"></i> Save';
                r.text().then(function(body) {
                    if (r.ok) {
                        st.textContent = '\u2713 Saved';
                        st.style.color  = '#10b981';
                    } else {
                        st.textContent = '\u2717 ' + (body || 'Failed to save');
                        st.style.color  = '#ef4444';
                    }
                    st.style.opacity = '1';
                    setTimeout(function() { st.style.opacity = '0'; }, 5000);
                });
            }).catch(function() {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-floppy"></i> Save';
                st.textContent = '✗ Network error';
                st.style.color  = '#ef4444';
                st.style.opacity = '1';
                setTimeout(function() { st.style.opacity = '0'; }, 3000);
            });
        }
    </script>
</body>
</html>
