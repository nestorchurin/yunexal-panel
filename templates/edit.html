<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ filename }} — {{ container.name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js"></script>
    <link href="/static/css/base.css?v=2" rel="stylesheet">
    <style>
        .yu-edit-layout {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .yu-edit-bar {
            display: flex;
            align-items: center;
            gap: .6rem;
            padding: .75rem 1.1rem;
            border-bottom: 1px solid var(--bdr);
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .yu-edit-path {
            font-size: .8rem;
            color: var(--muted);
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .yu-edit-path strong { color: var(--txt); }
        #yu-ace-wrap {
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }
        #yu-ace {
            width: 100%;
            height: 100%;
        }
        #yu-save-st {
            font-size: .8rem;
            opacity: 0;
            transition: opacity .3s;
        }
    </style>
</head>
<body>
    <div class="yu-sb-overlay" id="sbOverlay" onclick="closeSidebar()"></div>
    <div class="yu-layout" style="height:100vh;">
        <aside class="yu-sidebar" id="sidebar">
            <a href="/" class="sb-back"><i class="bi bi-arrow-left"></i> Dashboard</a>
            <div class="sb-brand"><span class="dot"></span>Yunexal Panel</div>
            <div class="sb-server">
                <div class="sb-server-name">{{ container.name }}</div>
                <span class="sb-status
                    {% if container.state == "running" %}sb-running
                    {% else if container.state == "restarting" %}sb-other
                    {% else %}sb-stopped{% endif %}">
                    <span class="sb-dot"></span>{{ container.state }}
                </span>
            </div>
            <nav class="sb-nav">
                <a href="/servers/{{id}}/console" class="sb-link"><i class="bi bi-terminal-fill"></i> Console</a>
                <a href="/servers/{{id}}/files" class="sb-link active"><i class="bi bi-folder2-open"></i> Files</a>
                <a href="/servers/{{id}}/networking" class="sb-link"><i class="bi bi-diagram-3"></i> Networking</a>
                <a href="/servers/{{id}}/settings" class="sb-link"><i class="bi bi-gear"></i> Settings</a>
            </nav>
        </aside>
        <main class="yu-main" style="display:flex;flex-direction:column;min-height:0;overflow:hidden;">
            <div class="yu-topbar-mobile">
                <button class="yu-hamburger" onclick="openSidebar()"><i class="bi bi-list"></i></button>
                <div class="yu-mob-brand"><span class="dot"></span>{{ container.name }}</div>
            </div>
            <div class="yu-content" style="flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;padding-bottom:0;">
                <div class="yu-panel" style="flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;margin-bottom:0;">
                    <div class="yu-edit-bar">
                        <a href="/servers/{{id}}/files" class="btn-yu btn-yu-ghost" style="flex-shrink:0;">
                            <i class="bi bi-arrow-left"></i> Files
                        </a>
                        <div class="yu-edit-path">
                            <i class="bi bi-file-earmark-code me-1"></i>
                            <strong>{{ filename }}</strong>
                            <span style="margin-left:.4rem;opacity:.5;">{{ path }}</span>
                        </div>
                        <span id="yu-save-st"></span>
                        <button type="button" id="yu-save-btn" class="btn-yu btn-yu-primary" style="flex-shrink:0;">
                            <i class="bi bi-floppy"></i> Save
                        </button>
                    </div>
                    <div id="yu-ace-wrap">
                        <div id="yu-ace"></div>
                    </div>
                    <pre id="yu-raw" style="display:none;">{{ content }}</pre>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/sidebar.js"></script>
    <script src="/static/js/footer.js"></script>
    <script>
        var YU_SID  = '{{ id }}';
        var YU_PATH = '{{ path }}';

        var ed = ace.edit('yu-ace');
        ed.setTheme('ace/theme/monokai');
        ed.session.setMode('{{ ace_mode }}');
        ed.setValue(document.getElementById('yu-raw').textContent, -1);
        ed.setShowPrintMargin(false);
        ed.setFontSize(13);

        // Ctrl+S / Cmd+S to save
        ed.commands.addCommand({
            name: 'save',
            bindKey: { win: 'Ctrl-S', mac: 'Command-S' },
            exec: doSave
        });

        document.getElementById('yu-save-btn').addEventListener('click', doSave);

        function doSave() {
            var btn = document.getElementById('yu-save-btn');
            var st  = document.getElementById('yu-save-st');
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-arrow-repeat"></i> Saving…';
            var params = new URLSearchParams();
            params.append('path', YU_PATH);
            params.append('content', ed.getValue());
            fetch('/api/servers/' + YU_SID + '/files/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params.toString()
            }).then(function(r) {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-floppy"></i> Save';
                r.text().then(function(body) {
                    if (r.ok) {
                        st.textContent = '\u2713 Saved';
                        st.style.color  = '#10b981';
                    } else {
                        st.textContent = '\u2717 ' + (body || 'Failed to save');
                        st.style.color  = '#ef4444';
                    }
                    st.style.opacity = '1';
                    setTimeout(function() { st.style.opacity = '0'; }, 5000);
                });
            }).catch(function() {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-floppy"></i> Save';
                st.textContent = '✗ Network error';
                st.style.color  = '#ef4444';
                st.style.opacity = '1';
                setTimeout(function() { st.style.opacity = '0'; }, 3000);
            });
        }
    </script>
</body>
</html>
